services:
  app:
    image: ghcr.io/jvaltteri/note-light:latest
    container_name: note-light
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/server/config.json:ro
      - ./db/:/app/server/db/
      - ./db/:/app/server/notes/

      - ./logo.png:/app/client/dist/logo.png:ro

    # --- Security Hardening --- #
    cap_drop: [ALL]     # Drop all kernel capabilities for security
    cap_add: []         # Do not add anything back

    read_only: true     # 6. Read-Only Root Filesystem
    # ---                    --- #

    restart: unless-stopped
